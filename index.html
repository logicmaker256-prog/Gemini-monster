<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3DアクションRPG</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; touch-action: none; font-family: sans-serif; }
        #title-screen { position: absolute; width: 100%; height: 100%; background: #222; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; transition: opacity 0.8s; }
        #title-screen h1 { font-size: 32px; margin-bottom: 20px; color: #FFD700; }
        #start-button { padding: 15px 40px; font-size: 20px; cursor: pointer; border-radius: 10px; background: #ff8c00; color: white; border: 2px solid #fff; font-weight: bold; }
        #game-screen { display: none; position: relative; width: 100%; height: 100%; }
        
        /* UIデザイン */
        .ui-container { position: absolute; padding: 10px; pointer-events: none; width: 100%; box-sizing: border-box; text-shadow: 1px 1px 2px black; }
        #hero-ui { top: 10px; left: 10px; color: white; }
        #dragon-ui { top: 10px; right: 10px; color: #ffcccc; text-align: right; }
        .bar-bg { width: 150px; height: 12px; background: #555; border: 1px solid #fff; margin-top: 5px; float: left; }
        .bar-bg-right { float: right; }
        .bar-fg-hp { height: 100%; background: #00ff00; width: 100%; transition: width 0.2s; }
        .bar-fg-stamina { height: 100%; background: #00aaff; width: 100%; transition: width 0.1s; }
        .bar-fg-enemy { height: 100%; background: #ff0000; width: 100%; transition: width 0.2s; }
        .clear { clear: both; }
        
        /* ゲームオーバー・クリア画面 */
        #result-text { position: absolute; top: 40%; width: 100%; text-align: center; font-size: 40px; font-weight: bold; display: none; z-index: 5; text-shadow: 2px 2px 4px #000; }
        #retry-button { position: absolute; top: 60%; left: 50%; transform: translateX(-50%); padding: 15px 30px; font-size: 20px; cursor: pointer; display: none; z-index: 5; border-radius: 10px; background: #555; color: white; border: 2px solid #fff; }
        
        /* 文字色 */
        .damage-text { color: #ff4444; font-weight: bold; }
        .evade-text { color: #88ccff; font-weight: bold; }
        .chance-text { color: #ffff00; font-weight: bold; }

        /* 🟢 新しいアイテムUI */
        #item-info { position: absolute; bottom: 80px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; font-family: sans-serif; pointer-events: none; }
        #use-item-button { position: absolute; bottom: 20px; left: 20px; padding: 12px 20px; font-size: 16px; cursor: pointer; border-radius: 10px; background: #ffcc00; border: 2px solid #fff; font-weight: bold; display: none; }
    </style>
</head>
<body>
    <div id="title-screen">
        <h1>ドラゴンハンター3D</h1>
        <button id="start-button">ゲームスタート</button>
    </div>

    <div id="game-screen">
        <div class="ui-container" id="hero-ui">
            <div id="hero-status" style="font-size: 16px; font-weight: bold;">勇者: 待機中</div>
            <div style="font-size: 12px; margin-top: 5px;">HP</div>
            <div class="bar-bg"><div class="bar-fg-hp" id="hero-hp-bar"></div></div><div class="clear"></div>
            <div style="font-size: 12px; margin-top: 2px;">STAMINA</div>
            <div class="bar-bg"><div class="bar-fg-stamina" id="hero-stamina-bar"></div></div><div class="clear"></div>
        </div>
        
        <div class="ui-container" id="dragon-ui">
            <div id="dragon-status" style="font-size: 16px; font-weight: bold;">ターゲットなし</div>
            <div style="font-size: 12px; margin-top: 5px;">ENEMY HP</div>
            <div class="bar-bg bar-bg-right"><div class="bar-fg-enemy" id="dragon-hp-bar" style="width: 0%;"></div></div><div class="clear"></div>
        </div>

        <div id="result-text"></div>
        <button id="retry-button">もう一度挑む</button>

        <div id="item-info">回復薬: 3回</div>
        <button id="use-item-button">アイテムを使う</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="models.js"></script>
    <script src="setup.js"></script>
    <script src="main.js"></script>
</body>
</html>
