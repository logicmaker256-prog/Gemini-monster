<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Monster Hunting</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #000; color: #fff; 
            font-family: 'Helvetica Neue', Arial, sans-serif; 
            user-select: none; -webkit-user-select: none; /* テキスト選択を防止 */
        }
        #game-screen { width: 100vw; height: 100vh; position: relative; display: none; }
        
        /* UI要素 */
        #ui-container { position: absolute; top: 10px; left: 10px; pointer-events: none; text-shadow: 1px 1px 2px #000; z-index: 5; }
        .bar-bg { width: 200px; height: 15px; background: #333; border: 2px solid #fff; margin-bottom: 5px; border-radius: 8px; overflow: hidden; }
        #hero-hp-bar { width: 100%; height: 100%; background: #00ff00; transition: width 0.2s; }
        #hero-stamina-bar { width: 100%; height: 100%; background: #ffff00; transition: width 0.1s; }
        #dragon-hp-bar { width: 100%; height: 100%; background: #ff0000; transition: width 0.2s; }
        
        #message-area { position: absolute; bottom: 80px; width: 100%; text-align: center; pointer-events: none; font-size: 1.2rem; font-weight: bold; text-shadow: 2px 2px 4px #000; z-index: 5; }
        .evade-text { color: #00ffff; font-style: italic; }
        
        /* ★【修正】回復薬ボタン：bottomを 100px にしてさらに上に引き上げました */
        #use-item-button { position: absolute; bottom: 100px; right: 20px; z-index: 10; padding: 15px 25px; font-size: 1.2rem; font-weight: bold; background: linear-gradient(135deg, #0088ff, #0055aa); color: white; border: 2px solid #fff; border-radius: 10px; display: none; pointer-events: auto; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        #use-item-button:active { transform: translateY(2px); box-shadow: 0 2px 3px rgba(0,0,0,0.5); }
        
        /* タイトル画面 */
        #title-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.85); z-index: 10; transition: opacity 0.8s; }
        h1 { font-size: 2.8rem; color: #ffaa00; text-shadow: 0 0 15px #ff0000; margin-bottom: 20px; text-align: center; }
        
        /* 操作説明パネルのスタイル */
        #instructions { 
            background: rgba(20, 30, 40, 0.8); 
            border: 2px solid #00ffff; 
            padding: 20px 30px; 
            border-radius: 15px; 
            margin-bottom: 40px; 
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            max-width: 80%;
        }
        #instructions h2 { margin: 0 0 15px 0; font-size: 1.4rem; color: #00ffff; text-align: center; border-bottom: 1px solid #00ffff; padding-bottom: 10px; }
        #instructions ul { list-style: none; padding: 0; margin: 0; font-size: 1.1rem; line-height: 1.8; }
        #instructions li { margin-bottom: 10px; }
        .highlight { color: #ffff00; font-weight: bold; }
        .sub-text { font-size: 0.9rem; color: #aaaaaa; display: block; margin-top: -4px; margin-left: 1em; }
        
        /* スタート・リトライボタン */
        .action-button { padding: 15px 50px; font-size: 1.5rem; font-weight: bold; cursor: pointer; border-radius: 30px; border: 3px solid #fff; background: linear-gradient(135deg, #ff4444, #aa0000); color: #fff; box-shadow: 0 0 15px #ff4444; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        #result-text { font-size: 3rem; font-weight: bold; position: absolute; top: 30%; width: 100%; text-align: center; display: none; text-shadow: 0 0 15px #000; z-index: 20; }
        #retry-button { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); display: none; z-index: 20; background: linear-gradient(135deg, #44aaff, #0055aa); box-shadow: 0 0 15px #44aaff; animation: pulse 1.5s infinite; }
    </style>
</head>
<body>

    <div id="title-screen">
        <h1>DRAGON HUNTER 3D</h1>
        
        <div id="instructions">
            <h2>🎮 操作説明</h2>
            <ul>
                <li><span class="highlight">移動</span> : 地面をタップ</li>
                <li><span class="highlight">攻撃</span> : ドラゴンをタップ
                    <span class="sub-text">※遠距離は魔法、近距離は剣で自動攻撃！</span>
                </li>
                <li><span class="highlight">回避</span> : 画面をスワイプ（弾く）
                    <span class="sub-text">※スタミナを消費して無敵の回転斬り！</span>
                </li>
            </ul>
        </div>
        
        <button id="start-button" class="action-button">GAME START</button>
    </div>

    <div id="game-screen">
        <div id="ui-container">
            <div>勇者 HP</div>
            <div class="bar-bg"><div id="hero-hp-bar"></div></div>
            <div>スタミナ</div>
            <div class="bar-bg"><div id="hero-stamina-bar"></div></div>
            <div id="item-info" style="margin-top: 10px; color: #ffff00; font-weight: bold;"></div>
            
            <div style="margin-top: 20px;">ドラゴン HP</div>
            <div class="bar-bg" style="border-color: #ffaa00;"><div id="dragon-hp-bar" style="width: 0%;"></div></div>
        </div>

        <div id="message-area">
            <div id="hero-status"></div>
            <div id="dragon-status" style="color: #ffaa00;"></div>
        </div>

        <button id="use-item-button">回復薬を使う</button>
        
        <div id="result-text"></div>
        <button id="retry-button" class="action-button">RETRY</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.css"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="models.js"></script>
    <script src="setup.js"></script>
    <script src="main.js"></script>
</body>
</html>
